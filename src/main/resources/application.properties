# ============================================================
# Perfil PADRAO: H2 em memoria — roda sem instalar nada.
# Para usar PostgreSQL: rode com  --spring.profiles.active=postgres
# ============================================================

spring.application.name=pontofacil

# Banco H2 em memoria
spring.datasource.url=jdbc:h2:mem:pontofacil;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 disponivel em http://localhost:8080/h2-console
spring.h2.console.enabled=true

# JPA gera o schema (Flyway desativado no perfil H2)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.flyway.enabled=false

# Servidor
server.port=8080

# JWT (apenas para testes locais — troque em producao)
app.jwt.secret=troque-este-segredo-por-uma-chave-bem-grande-com-no-minimo-32-bytes
app.jwt.expiration=86400000

# CORS — origens liberadas para o frontend
app.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:8080,http://localhost:3000,http://127.0.0.1:5501,http://localhost:5501

# Seed de dados de demonstracao
app.seed.enabled=true
