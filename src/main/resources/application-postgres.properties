# ============================================================
# Perfil PostgreSQL — ative com  --spring.profiles.active=postgres
# Ajuste url/usuario/senha conforme seu ambiente.
# ============================================================

spring.datasource.url=jdbc:postgresql://localhost:5432/pontofacil
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA valida o schema criado pelo Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway aplica as migrations de db/migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
